<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>春メニューダッシュボード｜千房グループ</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XPZJL7GN67"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XPZJL7GN67');</script>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c1:#1e2d45;--c2:#2563eb;--c3:#f8fafc;--c4:#e2e8f0;--c5:#f1f5f9;
  --g1:#059669;--g2:#d1fae5;--g3:#6ee7b7;
  --r1:#dc2626;--r2:#fee2e2;--r3:#fca5a5;
  --b1:#2563eb;--b2:#dbeafe;
  --n1:#e2e8f0;--n2:#64748b;--n3:#94a3b8;
  --radius:8px;--shadow:0 1px 8px rgba(0,0,0,.07);
  --hh:52px;--sb:220px;
}
html{font-size:14px;-webkit-text-size-adjust:100%;}
body{font-family:'Meiryo UI','メイリオ','Helvetica Neue',sans-serif;background:var(--c3);color:var(--c1);min-height:100vh;}

/* ── HEADER ── */
.hdr{height:var(--hh);background:var(--c1);display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.2);border-bottom:2px solid rgba(255,255,255,.08);}
.hdr-icon{font-size:24px;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-title{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}
.hdr-sub{font-size:10px;color:var(--n3);}
.hdr-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--n3);font-size:9px;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - var(--hh));}
.sidebar{width:var(--sb);background:#fff;border-right:1px solid var(--n1);padding:12px 10px;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;flex-shrink:0;}
.main{flex:1;padding:14px 16px;min-width:0;}

/* ── SIDEBAR ── */
.sb-section{margin-bottom:14px;}
.sb-label{font-size:9px;font-weight:700;color:var(--n2);letter-spacing:.1em;text-transform:uppercase;padding:2px 4px 5px;border-bottom:1px solid var(--n1);margin-bottom:5px;display:block;}
.sb-btn{display:block;width:100%;text-align:left;padding:5px 8px;margin-bottom:2px;border-radius:6px;border:1px solid var(--n1);background:#fff;font-family:inherit;font-size:11px;font-weight:600;color:var(--n2);cursor:pointer;transition:.12s;line-height:1.3;}
.sb-btn:hover{border-color:var(--c2);color:var(--c2);}
.sb-btn.on{background:var(--c2);color:#fff;border-color:var(--c2);}
.sb-btn.on-navy{background:var(--c1);color:#fff;border-color:var(--c1);}
.sb-btn.on-blue{background:var(--b1);color:#fff;border-color:var(--b1);}
.sb-wk-sub{font-size:8px;font-weight:400;opacity:.8;display:block;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--n1);margin-bottom:14px;gap:2px;}
.tab{font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--n2);white-space:nowrap;transition:.12s;}
.tab:hover{color:var(--c1);}
.tab.on{color:var(--c2);border-bottom-color:var(--c2);}

/* ── STATES ── */
#ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--n1);border-top-color:var(--c2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ld-txt{font-size:12px;color:var(--n2);}
#nodata{display:none;align-items:center;justify-content:center;min-height:60vh;padding:24px;}
.nodata-box{border:2px dashed var(--n1);border-radius:var(--radius);background:#fff;padding:36px 28px;text-align:center;max-width:480px;box-shadow:var(--shadow);}
.nodata-box h2{font-size:16px;margin-bottom:10px;}
.nodata-box p{font-size:12px;color:var(--n2);line-height:1.8;}
.nodata-code{background:#f0f0f0;border-radius:6px;padding:10px 14px;font-family:monospace;font-size:11px;text-align:left;margin-top:12px;line-height:1.7;}
#db{display:none;}

/* ── ALERT ── */
.alert-bar{background:var(--r2);border:1px solid var(--r3);border-left:4px solid var(--r1);border-radius:6px;padding:8px 12px;margin-bottom:12px;display:none;}
.alert-bar.on{display:flex;align-items:center;gap:8px;}
.alert-icon{font-size:16px;flex-shrink:0;}
.alert-txt{font-size:11px;font-weight:700;color:var(--r1);}

/* ── FILTER TAG ── */
.filter-tag{background:var(--b2);border:1px solid #bfdbfe;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--b1);display:none;align-items:center;gap:6px;margin-bottom:10px;}
.filter-tag.on{display:flex;}
.filter-clr{cursor:pointer;text-decoration:underline;margin-left:auto;font-size:9px;}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.kpi-card{background:#fff;border:1px solid var(--n1);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 14px 12px;display:flex;flex-direction:column;gap:4px;}
.kpi-card.main{border-top:4px solid var(--c2);background:#fff;}
.kpi-card.green{border-top:4px solid var(--g1);}
.kpi-card.blue{border-top:4px solid var(--b1);}
.kpi-card.gray{border-top:4px solid var(--n2);}
.kpi-label{font-size:10px;font-weight:700;color:var(--n2);}
.kpi-value{font-size:34px;font-weight:800;line-height:1;color:var(--c2);}
.kpi-value .unit{font-size:14px;font-weight:400;color:var(--n2);}
.kpi-value2{font-size:22px;font-weight:900;line-height:1.1;}
.kpi-sub{font-size:10px;color:var(--n3);}
.kpi-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid transparent;}
.tag-ok{background:var(--g2);border-color:var(--g3);color:var(--g1);}
.tag-ng{background:var(--r2);border-color:var(--r3);color:var(--r1);}
.tag-inf{background:var(--b2);border-color:#c8d8f0;color:var(--b1);}
.tag-up{background:var(--g2);border-color:var(--g3);color:var(--g1);}
.tag-dn{background:var(--r2);border-color:var(--r3);color:var(--r1);}
.kpi-achieve{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px;}
.ach-box{border-radius:6px;padding:6px;text-align:center;}
.ach-ok{background:var(--g2);border:1px solid var(--g3);}
.ach-ng{background:var(--r2);border:1px solid var(--r3);}
.ach-num{font-size:26px;font-weight:900;line-height:1;}
.ach-ok .ach-num{color:var(--g1);}
.ach-ng .ach-num{color:var(--r1);}
.ach-lbl{font-size:9px;font-weight:700;}
.ach-ok .ach-lbl{color:var(--g1);}
.ach-ng .ach-lbl{color:var(--r1);}

/* ── SECTION ── */
.sec-label{font-size:9px;font-weight:700;color:var(--n2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.card{background:#fff;border:1px solid var(--n1);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-hint{font-size:9px;color:var(--b1);padding:4px 10px;background:var(--b2);border-bottom:1px solid #bfdbfe;}

/* ── CHART ── */
.chart-wrap{padding:12px 14px 10px;}
.chart-title{font-size:11px;font-weight:700;color:var(--c1);margin-bottom:10px;}
.chart-toggle{display:flex;gap:4px;margin-bottom:10px;}
.chart-toggle-btn{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--n1);background:#fff;cursor:pointer;color:var(--n2);}
.chart-toggle-btn.on{background:var(--c1);color:#fff;border-color:var(--c1);}
.chart-area{position:relative;}
.chart-y-axis{display:flex;flex-direction:column;justify-content:space-between;font-size:8px;color:var(--n3);text-align:right;padding-right:6px;height:100%;min-width:36px;flex-shrink:0;}
.chart-body{flex:1;height:100%;position:relative;display:flex;align-items:flex-end;}
.chart-gridlines{position:absolute;inset:0;pointer-events:none;}
.chart-gridline{position:absolute;left:0;right:0;border-top:1px solid #f0f2f5;}
.chart-kpi-line{position:absolute;left:0;right:0;border-top:1.5px dashed var(--r1);pointer-events:none;}
/* 折れ線グラフ */
.line-chart{width:100%;height:100%;position:absolute;top:0;left:0;}
/* 棒グラフ */
.bars{display:flex;align-items:flex-end;gap:6px;height:100%;width:100%;position:relative;z-index:1;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:3px;}
.bar-val{font-size:8px;font-weight:700;text-align:center;white-space:nowrap;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.bar-lbl{font-size:8px;color:var(--n2);white-space:nowrap;}
.chart-note{font-size:8px;color:var(--n3);text-align:right;margin-top:4px;}

/* ── RANK TABLE ── */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{background:var(--c1);color:#fff;padding:6px 8px;font-size:9px;font-weight:700;white-space:nowrap;text-align:center;}
.rank-table th.left{text-align:left;}
.rank-table td{padding:5px 8px;border-bottom:1px solid #f0f2f5;font-size:10px;vertical-align:middle;}
.rank-table tr:last-child td{border-bottom:none;}
.rank-table tr:nth-child(even) td{background:#fafbfc;}
.rank-table tr:hover td{background:var(--c5);cursor:pointer;}
.rank-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.rn-1{background:#d4a017;color:#fff;}
.rn-2{background:#a8a9ad;color:#fff;}
.rn-3{background:#c87941;color:#fff;}
.rn-n{background:#eef0f4;color:var(--n2);}
.store-name{font-size:10px;font-weight:700;color:var(--b1);text-decoration:underline;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.bar-cell{min-width:80px;}
.bar-mini{height:7px;background:#eef0f4;border-radius:2px;position:relative;}
.bar-mini-fill{height:7px;border-radius:2px;}
.bar-mini-kpi{position:absolute;top:-2px;bottom:-2px;border-left:1.5px dashed var(--r1);}
.rate-val{font-size:11px;font-weight:700;text-align:right;white-space:nowrap;}
.rate-ok{color:var(--g1);}
.rate-ng{color:var(--r1);}
.chg-val{font-size:9px;font-weight:700;text-align:right;white-space:nowrap;}
.chg-up{color:var(--g1);}
.chg-dn{color:var(--r1);}
.chg-eq{color:var(--n2);}
.badge-ok{display:inline-block;background:var(--g2);border:1px solid var(--g3);color:var(--g1);font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;}
.badge-ng{display:inline-block;background:var(--r2);border:1px solid var(--r3);color:var(--r1);font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;}
.badge-warn{display:inline-block;background:#fff3cd;border:1px solid #ffc107;color:#856404;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;}

/* ── MENU TABLE ── */
.menu-table{width:100%;border-collapse:collapse;}
.menu-table th{background:var(--c1);color:#fff;padding:6px 8px;font-size:9px;font-weight:700;}
.menu-table th.left{text-align:left;}
.menu-table td{padding:6px 8px;border-bottom:1px solid #f0f2f5;font-size:10px;}
.menu-table tr:last-child td{border-bottom:none;}
.menu-table tr:nth-child(even) td{background:#fafbfc;}
.menu-table tr:hover td{background:var(--c5);cursor:pointer;}
.menu-name{font-size:10px;font-weight:700;color:var(--b1);text-decoration:underline;cursor:pointer;}
.menu-bar-wrap{display:flex;align-items:center;gap:6px;}
.menu-bar-bg{flex:1;height:6px;background:#eef0f4;border-radius:3px;}
.menu-bar-fill{height:6px;border-radius:3px;}
.menu-pct{font-size:9px;font-weight:700;min-width:32px;text-align:right;}

/* ── SUMMARY BARS ── */
.sum-section{padding:10px 12px;}
.sum-title{font-size:10px;font-weight:700;color:var(--c1);margin-bottom:7px;padding-bottom:4px;border-bottom:2px solid var(--n1);}
.sum-title.mt{margin-top:10px;padding-top:8px;border-top:1px solid var(--n1);}
.sum-row{margin-bottom:7px;}
.sum-row:last-child{margin-bottom:0;}
.sum-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.sum-name{font-size:10px;font-weight:700;}
.sum-rate{font-size:12px;font-weight:900;}
.sum-bar-bg{height:6px;background:#eef0f4;border-radius:3px;position:relative;}
.sum-bar-fill{height:6px;border-radius:3px;}
.sum-bar-kpi{position:absolute;top:-3px;bottom:-3px;border-left:1.5px dashed var(--r1);}
.sum-sub{font-size:8px;color:var(--n3);margin-top:2px;}

/* ── COMMENT ── */
.comment-box{padding:12px;}
.comment-hdr{font-size:10px;font-weight:700;color:#fff;background:var(--c1);margin:-12px -12px 10px;padding:8px 12px;letter-spacing:.02em;}
.comment-row{display:flex;gap:8px;margin-bottom:10px;}
.comment-row:last-child{margin-bottom:0;}
.comment-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.comment-body{}
.comment-label{font-size:9px;font-weight:700;margin-bottom:2px;}
.comment-text{font-size:10px;line-height:1.6;}



/* ── TREND TREND ── */
.trend-table{width:100%;border-collapse:collapse;}
.trend-table th{background:var(--c1);color:#fff;padding:5px 8px;font-size:9px;font-weight:700;text-align:center;}
.trend-table td{padding:5px 8px;border-bottom:1px solid var(--n1);text-align:center;font-size:11px;}
.trend-table tr:last-child td{border-bottom:none;}
.trend-table tr:nth-child(even) td{background:#fafbfc;}
.trend-table td.left{text-align:left;font-weight:700;}
.trend-table td.tiny{font-size:9px;color:var(--n2);font-weight:400;}
.t-ok{color:var(--g1);font-weight:700;}
.t-ng{color:var(--r1);font-weight:700;}

/* ── MONTHLY ── */
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.month-card{padding:12px;}
.month-title{font-size:13px;font-weight:700;color:var(--c1);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--n1);}
.month-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px;}
.month-kpi{background:var(--c3);border-radius:5px;padding:6px;text-align:center;border:1px solid var(--n1);}
.month-kpi-label{font-size:8px;color:var(--n2);font-weight:700;margin-bottom:2px;}
.month-kpi-val{font-size:16px;font-weight:900;}
.month-kpi-unit{font-size:8px;color:var(--n2);}

/* ── MO COMPARE ── */
.mo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mo-card{padding:12px;}
.mo-title{font-size:13px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--c3);}
.mo-title.mob{color:var(--b1);}
.mo-title.pop{color:var(--c1);}

/* ── DRILL DOWN MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
.modal-ov.on{display:flex;}
.modal{background:#fff;border-radius:12px;width:92%;max-width:720px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.modal-hdr{background:var(--c1);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-icon{font-size:18px;}
.modal-title{font-size:13px;font-weight:700;flex:1;}
.modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-body{padding:14px;overflow-y:auto;}
.modal-info{font-size:10px;color:var(--n2);margin-bottom:10px;}
.modal-table-hdr{display:grid;align-items:center;background:var(--c1);padding:5px 8px;border-radius:5px 5px 0 0;gap:4px;}
.modal-table-hdr span{font-size:9px;font-weight:700;color:#fff;}
.modal-row{display:grid;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f0f2f5;}
.modal-row:last-child{border-bottom:none;}
.modal-row:nth-child(even){background:#fafbfc;}
.modal-nm{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-bw{position:relative;}
.modal-bt{height:8px;background:#eef0f4;border-radius:2px;}
.modal-bf{height:8px;border-radius:2px;}
.modal-kl{position:absolute;top:0;bottom:0;border-left:1.5px dashed var(--r1);}
.modal-rv{font-size:10px;font-weight:700;text-align:right;}
.modal-sv{font-size:8px;color:var(--n3);text-align:right;}

/* ── INFO BAR ── */
.info-bar{background:var(--b2);border:1px solid #c8d8f0;border-radius:6px;padding:6px 12px;font-size:10px;font-weight:700;color:var(--b1);margin-bottom:12px;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .kpi-card.main{grid-column:1/-1;}
  .month-grid{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .chart-2col{grid-template-columns:1fr!important;}

  :root{--sb:0px;--hh:52px;}
  .sidebar{display:none;}
  .main{padding:10px 10px;}
  .kpi-value{font-size:28px;}
  .youbi-grid{grid-template-columns:repeat(3,1fr);}
  .month-grid{grid-template-columns:1fr;}
  .mo-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<!-- HEADER -->
<div class="hdr">
  
  <div class="hdr-info">
    <div class="hdr-title">季節メニューおすすめ販売数速報</div>
    <div class="hdr-sub">千房グループ　季節メニュー管理本部</div>
  </div>
  <div class="hdr-badge" id="hdr-period">読み込み中...</div>
</div>

<!-- DRILL DOWN MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-icon" id="m-icon"></span>
      <span class="modal-title" id="m-title"></span>
      <button class="modal-close" id="m-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <!-- 表示週 -->
  <div class="sb-section">
    <span class="sb-label">&#x1F4CB; 表示週</span>
    <div id="sb-weeks"></div>
    <button class="sb-btn" id="btn-cum" data-wk="__cum">&#x1F4C8; 累積表示</button>
  </div>
  <!-- 事業部 -->
  <div class="sb-section">
    <span class="sb-label">&#x1F3E2; 事業部</span>
    <button class="sb-btn on" data-f="biz" data-v="all">すべて</button>
    <button class="sb-btn" data-f="biz" data-v="直営">直営</button>
    <button class="sb-btn" data-f="biz" data-v="FC">FC</button>
  </div>
  <!-- メニュー -->
  <div class="sb-section">
    <span class="sb-label">&#x1F35E; メニュー</span>
    <div id="sb-menus"></div>
  </div>
  <!-- 地域 -->
  <div class="sb-section">
    <span class="sb-label">&#x1F5FA; 地域</span>
    <button class="sb-btn on" data-f="rgn" data-v="all">すべて</button>
    <button class="sb-btn" data-f="rgn" data-v="北海道">北海道</button>
    <button class="sb-btn" data-f="rgn" data-v="東北">東北</button>
    <button class="sb-btn" data-f="rgn" data-v="関東">関東</button>
    <button class="sb-btn" data-f="rgn" data-v="北陸">北陸</button>

// ============================================================
// CSV PARSER (Shift-JIS aware via ArrayBuffer)
// ============================================================
function parseCSV(text){
  var NL = '\n', CR = '\r';
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  var clean = '';
  for(var i=0;i<text.length;i++){ if(text[i] !== CR) clean += text[i]; }
  return clean.split(NL).filter(function(l){ return l.length > 1; }).map(function(l){
    var cols=[], cur='', inQ=false;
    for(var j=0;j<l.length;j++){
      var ch=l[j];
      if(ch==='"'){ if(inQ&&l[j+1]==='"'){cur+='"';j++;}else inQ=!inQ; }
      else if(ch===','&&!inQ){ cols.push(cur); cur=''; }
      else cur+=ch;
    }
    cols.push(cur);
    return cols;
  });
}

// ============================================================
// DATA LOADING
// ============================================================
function fetchText(url){
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error(url + ' not found');
    return r.arrayBuffer();
  }).then(function(buf){
    try{ return new TextDecoder('shift-jis').decode(buf); }
    catch(e){ return new TextDecoder('utf-8').decode(buf); }
  });
}

function parseSales(text){
  // 列: 0=営業日, 2=曜日区分, 7=業態コード, 8=業態名, 10=店舗名, 17=メニュー名, 20=販売数
  var rows = parseCSV(text), map = {};
  for(var i=1;i<rows.length;i++){
    var c=rows[i];
    if(c.length<21 || !c[0].trim()) continue;
    var mn = c[17].trim();
    if(!isSp(mn)) continue;
    var date=c[0].trim(), store=c[10].trim(), biz=c[8].trim(), youbi=c[2].trim();
    var sales = parseFloat(c[20]) || 0;
    var key = store+'|'+date;
    if(!map[key]) map[key]={store:store,biz:gBiz(biz),date:date,youbi:youbi,menus:{}};
    var nm = normMenu(mn);
    map[key].menus[nm] = (map[key].menus[nm]||0) + sales;
  }
  return map;
}

function parseCust(text){
  // 列: 5=店舗名称, 6=営業日, 13=売上分類, 20=客数実績
  var rows = parseCSV(text), map = {};
  for(var i=1;i<rows.length;i++){
    var c=rows[i];
    if(c.length<21 || !c[6].trim()) continue;
    if(c[13].trim() !== '計') continue;
    map[c[5].trim()+'|'+c[6].trim()] = parseInt(c[20]) || 0;
  }
  return map;
}

function weekInfo(ds){
  var p=ds.split('/');
  var dt=new Date(+p[0],+p[1]-1,+p[2]);
  var dow=dt.getDay();
  var mon=new Date(dt); mon.setDate(dt.getDate()-(dow===0?6:dow-1));
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);
  function fmt(d){ return d.getFullYear()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'/'+(d.getDate()<10?'0':'')+d.getDate(); }
  return {wk:fmt(mon), wl:fmt(mon)+'〜'+fmt(sun), mon:mon.getMonth()+1};
}

function buildWeeks(salesMap, custMap){
  var wkMap = {};
  Object.keys(salesMap).forEach(function(key){
    var sd=salesMap[key], wi=weekInfo(sd.date);
    var cust = custMap[key] || 0;
    if(!wkMap[wi.wk]) wkMap[wi.wk]={wk:wi.wk,wl:wi.wl,mon:wi.mon,storeMap:{}};
    var wd=wkMap[wi.wk];
    if(!wd.storeMap[sd.store])
      wd.storeMap[sd.store]={biz:sd.biz,loc:gL(sd.store),rgn:gR(sd.store),mo:gMO(sd.store),
        sales:0,cust:0,menus:{},youbi:{}};
    var st=wd.storeMap[sd.store];
    st.cust += cust;
    Object.keys(sd.menus).forEach(function(mn){
      st.sales += sd.menus[mn];
      st.menus[mn] = (st.menus[mn]||0) + sd.menus[mn];
      st.youbi[sd.youbi] = (st.youbi[sd.youbi]||0) + sd.menus[mn];
    });
  });
  return Object.keys(wkMap).sort().map(function(wk){
    var wd=wkMap[wk];
    var stores=Object.keys(wd.storeMap).map(function(sn){
      var s=wd.storeMap[sn];
      return {name:sn,biz:s.biz,loc:s.loc,rgn:s.rgn,mo:s.mo,
        sales:s.sales,cust:s.cust,rate:s.cust>0?s.sales/s.cust*100:0,
        menus:s.menus,youbi:s.youbi};
    }).sort(function(a,b){return b.rate-a.rate;});
    var ts=0,tc=0,mn_total={},youbi={};
    stores.forEach(function(s){
      ts+=s.sales; tc+=s.cust;
      Object.keys(s.menus).forEach(function(m){ mn_total[m]=(mn_total[m]||0)+s.menus[m]; });
      Object.keys(s.youbi).forEach(function(y){ youbi[y]=(youbi[y]||0)+s.youbi[y]; });
    });
    var ml=Object.keys(mn_total).map(function(m){return{name:m,sales:mn_total[m]};})
             .sort(function(a,b){return b.sales-a.sales;});
    var smMap={};
    stores.forEach(function(s){ smMap[s.name]=s.menus; });
    return {wk:wk,wl:wd.wl,mon:wd.mon,stores:stores,ml:ml,ts:ts,tc:tc,
      ovr:tc>0?ts/tc*100:0,youbi:youbi,smMap:smMap};
  });
}

// ============================================================
// FILTER
// ============================================================
function applyFilter(stores){
  return stores.filter(function(s){
    if(F.biz !== 'all' && s.biz !== F.biz) return false;
    if(F.rgn !== 'all' && s.rgn !== F.rgn) return false;
    if(F.mo  !== 'all' && s.mo  !== F.mo ) return false;
    return true;
  });
}
function applyMenuFilter(ml){
  if(F.mn === 'all') return ml;
  return ml.filter(function(m){ return m.name === F.mn; });
}
function filterLabel(){
  var p=[];
  if(F.biz!=='all') p.push('事業部:'+F.biz);
  if(F.mn !=='all') p.push('メニュー:'+F.mn);
  if(F.rgn!=='all') p.push('地域:'+F.rgn);
  if(F.mo !=='all') p.push(F.mo==='MO'?'MO':'POP');
  return p.join(' / ');
}

// ============================================================
// AGGREGATION HELPERS
// ============================================================
function aggByKey(fs, key){
  var map={};
  fs.forEach(function(s){
    var k=s[key];
    if(!map[k]) map[k]={name:k,sales:0,cust:0,cnt:0};
    map[k].sales+=s.sales; map[k].cust+=s.cust; map[k].cnt++;
  });
  return Object.values(map).map(function(d){
    d.rate=d.cust>0?d.sales/d.cust*100:0; return d;
  }).sort(function(a,b){return b.rate-a.rate;});
}
function aggMenu(fs, smMap){
  var mm={};
  fs.forEach(function(s){
    var sm=smMap[s.name]||{};
    Object.keys(sm).forEach(function(m){ mm[m]=(mm[m]||0)+sm[m]; });
  });
  var ml=Object.keys(mm).map(function(m){return{name:m,sales:mm[m]};})
           .sort(function(a,b){return b.sales-a.sales;});
  if(F.mn !== 'all') ml=ml.filter(function(m){ return m.name===F.mn; });
  return ml;
}
function aggYoubi(fs){
  var ym={};
  fs.forEach(function(s){
    Object.keys(s.youbi||{}).forEach(function(y){ ym[y]=(ym[y]||0)+(s.youbi[y]||0); });
  });
  return ym;
}
function wkFilterSummary(wd){
  var fs=applyFilter(wd.stores);
  var ml=aggMenu(fs, wd.smMap);
  var ts=0,tc=0;
  fs.forEach(function(s){ ts+=s.sales; tc+=s.cust; });
  return {fs:fs,ml:ml,ts:ts,tc:tc,ovr:tc>0?ts/tc*100:0,youbi:aggYoubi(fs)};
}

// ============================================================
// CHART HELPERS
// ============================================================
function makeLineChart(wkSeries, metric, kpiLine){
  if(!wkSeries || wkSeries.length < 2)
    return '<div style="text-align:center;padding:48px 16px;color:var(--n3);font-size:12px">2週以上のデータで表示されます</div>';
  var vals = wkSeries.map(function(w){ return w.val; });
  var maxV = Math.max.apply(null,vals), minV = Math.min.apply(null,vals);
  // Y軸レンジ：差を強調しつつKPI線も見せる
  var yMin, yMax;
  if(kpiLine){
    var dataMin = Math.min(minV, kpiLine);
    var dataMax = Math.max(maxV, kpiLine);
    var pad = (dataMax - dataMin) * 0.25 || dataMax * 0.1 || 0.5;
    yMin = Math.max(0, dataMin - pad);
    yMax = dataMax + pad;
  } else {
    var pad = (maxV - minV) * 0.3 || maxV * 0.1 || 1;
    yMin = Math.max(0, minV - pad);
    yMax = maxV + pad;
  }
  var range = yMax - yMin || 0.01;
  // SVG寸法
  var VW=400, VH=180, pL=44, pR=12, pT=28, pB=32;
  var cW=VW-pL-pR, cH=VH-pT-pB;
  var n = wkSeries.length;
  function xp(i){ return pL + (n===1 ? cW/2 : i/(n-1)*cW); }
  function yp(v){ return pT + cH - (v-yMin)/range*cH; }
  var pts = wkSeries.map(function(w,i){ return {x:xp(i),y:yp(w.val),val:w.val,lbl:w.lbl}; });
  // path
  var pathD = pts.map(function(p,i){ return (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1); }).join(' ');
  var areaD = pathD+' L'+pts[pts.length-1].x.toFixed(1)+','+(pT+cH)+' L'+pts[0].x.toFixed(1)+','+(pT+cH)+' Z';
  // グリッド（3本）
  var grids = [0.25,0.5,0.75].map(function(r){
    var gy=(pT+cH-r*cH).toFixed(1);
    var gv = yMin + r*range;
    var glbl = metric==='rate' ? gv.toFixed(1)+'%' : Math.round(gv).toLocaleString();
    return '<line x1="'+pL+'" y1="'+gy+'" x2="'+(pL+cW)+'" y2="'+gy+'" stroke="#e2e8f0" stroke-width="1"/>'+
           '<text x="'+(pL-4)+'" y="'+(parseFloat(gy)+3.5)+'" text-anchor="end" font-size="9" fill="#94a3b8">'+glbl+'</text>';
  }).join('');
  // KPI破線
  var kpiSvg = '';
  if(kpiLine){
    var ky=yp(kpiLine).toFixed(1);
    kpiSvg='<line x1="'+pL+'" y1="'+ky+'" x2="'+(pL+cW)+'" y2="'+ky+'" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,4"/>'+
            '<text x="'+(pL+cW+2)+'" y="'+(parseFloat(ky)+3.5)+'" font-size="8" fill="#dc2626">KPI</text>';
  }
  // エリア・ライン
  var areaSvg='<path d="'+areaD+'" fill="rgba(37,99,235,.08)"/>';
  var lineSvg='<path d="'+pathD+'" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // ドット + ラベル
  var dotsSvg = pts.map(function(p,i){
    var ok = kpiLine ? p.val>=kpiLine : true;
    var col = ok ? '#059669' : '#dc2626';
    var valStr = metric==='rate' ? p.val.toFixed(2)+'%' : p.val.toLocaleString();
    // ラベル位置：最初は右、最後は左、他は上
    var anchor = i===0?'start':i===n-1?'end':'middle';
    var lx = p.x.toFixed(1);
    var ly = (p.y - 10).toFixed(1);
    return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="5" fill="'+col+'" stroke="#fff" stroke-width="2"/>'+
           '<text x="'+lx+'" y="'+ly+'" text-anchor="'+anchor+'" font-size="10" font-weight="700" fill="'+col+'">'+valStr+'</text>'+
           '<text x="'+p.x.toFixed(1)+'" y="'+(pT+cH+14)+'" text-anchor="middle" font-size="9" fill="#64748b">'+p.lbl+'</text>';
  }).join('');
  // 枠線（左・下）
  var axesSvg='<line x1="'+pL+'" y1="'+pT+'" x2="'+pL+'" y2="'+(pT+cH)+'" stroke="#e2e8f0" stroke-width="1"/>'+
              '<line x1="'+pL+'" y1="'+(pT+cH)+'" x2="'+(pL+cW)+'" y2="'+(pT+cH)+'" stroke="#e2e8f0" stroke-width="1"/>';
  var svg='<svg viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:100%;height:auto;display:block">'+
    grids+axesSvg+kpiSvg+areaSvg+lineSvg+dotsSvg+'</svg>';
  return svg;
}
function htmlAlert(fs){
  var bad=fs.filter(function(s){return s.rate<KPI_RATE;});
  if(!bad.length) return '';
  var worst=bad.sort(function(a,b){return a.rate-b.rate;}).slice(0,3);
  var txt=worst.map(function(s){return s.name+'（'+s.rate.toFixed(2)+'%）';}).join('　');
  return '<div class="alert-bar on">'+
    '<div class="alert-icon">&#x26A0;</div>'+
    '<div class="alert-txt">要改善: '+txt+(bad.length>3?' 他'+(bad.length-3)+'店':'')+'</div>'+
  '</div>';
}

function renderWeek(){
  var isCum = CW === '__cum';
  var d = isCum ? null : ALL_WK.filter(function(w){return w.wk===CW;})[0]||ALL_WK[ALL_WK.length-1];
  var prevD = d ? (ALL_WK[ALL_WK.indexOf(d)-1]||null) : null;

  // aggregate
  var fs, ml, ts, tc, ovr, ym, prevTs=null, prevOvr=null;
  if(isCum){
    // accumulate all weeks
    var sM={}, smC={};
    ALL_WK.forEach(function(wd){
      wd.stores.forEach(function(s){
        if(!sM[s.name]) sM[s.name]={biz:s.biz,loc:s.loc,rgn:s.rgn,mo:s.mo,sales:0,cust:0,menus:{},youbi:{}};
        sM[s.name].sales+=s.sales; sM[s.name].cust+=s.cust;
        Object.keys(s.menus).forEach(function(m){ sM[s.name].menus[m]=(sM[s.name].menus[m]||0)+s.menus[m]; });
        if(!smC[s.name]) smC[s.name]={};
        Object.keys(s.menus).forEach(function(m){ smC[s.name][m]=(smC[s.name][m]||0)+s.menus[m]; });
      });
    });
    var cumStores=Object.keys(sM).map(function(n){ var s=sM[n];
      return {name:n,biz:s.biz,loc:s.loc,rgn:s.rgn,mo:s.mo,sales:s.sales,cust:s.cust,
        rate:s.cust>0?s.sales/s.cust*100:0,menus:s.menus,youbi:{}}; })
      .sort(function(a,b){return b.rate-a.rate;});
    fs=applyFilter(cumStores);
    ml=aggMenu(fs,smC);
    ts=0;tc=0; fs.forEach(function(s){ts+=s.sales;tc+=s.cust;});
    ovr=tc>0?ts/tc*100:0;
    ym=aggYoubi(fs);
  } else {
    var s=wkFilterSummary(d);
    fs=s.fs; ml=s.ml; ts=s.ts; tc=s.tc; ovr=s.ovr; ym=s.youbi;
    if(prevD){ var ps=wkFilterSummary(prevD); prevTs=ps.ts; prevOvr=ps.ovr; }
  }

  // trend series for chart
  var rateSeries=[], salesSeries=[];
  ALL_WK.forEach(function(wd,i){
    var ws=wkFilterSummary(wd);
    rateSeries.push({lbl:(i+1)+'W',val:ws.ovr});
    salesSeries.push({lbl:(i+1)+'W',val:ws.ts});
  });

  // trend table
  var trendRows=ALL_WK.map(function(wd,i){
    var ws=wkFilterSummary(wd), ok=ws.ovr>=KPI_RATE;
    return '<tr><td class="left">'+(i+1)+'W</td>'+
      '<td class="tiny">'+wd.wl+'</td>'+
      '<td class="'+(ok?'t-ok':'t-ng')+'">'+ws.ovr.toFixed(2)+'%</td>'+
      '<td>'+ws.ts.toLocaleString()+'食</td>'+
      '<td>'+ws.tc.toLocaleString()+'名</td>'+
      '<td><span class="'+(ok?'badge-ok':'badge-ng')+'">'+(ok?'達成':'未達')+'</span></td>'+
    '</tr>';
  }).join('');

  var fl=filterLabel();
  var infoHtml=isCum?'<div class="info-bar">&#x1F4C8; 累積表示（全'+ALL_WK.length+'週）</div>':'';
  document.getElementById('hdr-period').textContent=(d?d.wl:ALL_WK[ALL_WK.length-1].wl);

  // layout
  document.getElementById('tab-week').innerHTML=
    infoHtml+
    htmlAlert(fs)+
    (fl?'<div class="filter-tag on">&#x1F50D; '+fl+'<span class="filter-clr" id="btn-clr">クリア</span></div>':'')+
    htmlKPI(fs,ts,tc,prevTs,prevOvr)+
    // Charts (2col)
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">'+
      '<div class="card"><div class="chart-wrap"><div class="chart-title">&#x1F4C8; 注文率 週次推移（赤破線＝KPI '+KPI_RATE+'%）</div>'+
        makeLineChart(rateSeries,'rate',KPI_RATE)+
        '<div class="chart-note">※ベースライン切り捨て表示</div></div></div>'+
      '<div class="card"><div class="chart-wrap"><div class="chart-title">&#x1F338; 販売数 週次推移</div>'+
        makeLineChart(salesSeries,'sales',null)+
        '<div class="chart-note">※ベースライン切り捨て表示</div></div></div>'+
    '</div>'+
    '<div class="sec-label">店舗別 注文率ランキング</div>'+
    htmlRankTable(fs, prevD?applyFilter(prevD.stores):null)+
    '<div style="display:grid;grid-template-columns:1fr 300px;gap:12px;margin-bottom:12px;">'+
      '<div>'+
        '<div class="sec-label">メニュー別 販売数（降順）</div>'+
        htmlMenuTable(ml,ts)+
      '</div>'+
      '<div>'+
        '<div class="card" style="margin-bottom:10px;">'+htmlSummaryBars(fs)+'</div>'+
        '<div class="card">'+htmlComment(fs,ml,ts,tc)+'</div>'+
      '</div>'+
    '</div>'+
    // Trend table
    (ALL_WK.length>=2?
      '<div class="sec-label">週次トレンド</div>'+
      '<div class="card" style="margin-bottom:12px;overflow-x:auto">'+
        '<table class="trend-table"><thead><tr><th class="left">週</th><th>期間</th><th>注文率</th><th>販売数</th><th>総客数</th><th>KPI</th></tr></thead>'+
        '<tbody>'+trendRows+'</tbody></table></div>'
      :'');

  // event listeners
  if(document.getElementById('btn-clr'))
    document.getElementById('btn-clr').addEventListener('click', function(){
      F={biz:'all',mn:'all',rgn:'all',mo:'all'};
      document.querySelectorAll('.sb-btn[data-f]').forEach(function(b){
        b.classList.toggle('on',b.getAttribute('data-v')==='all');
      });
      renderAll();
    });
  document.querySelectorAll('.store-name[data-si]').forEach(function(el){
    el.addEventListener('click',function(){ drillStore(parseInt(el.getAttribute('data-si'))); });
  });
  document.querySelectorAll('.menu-name[data-mi]').forEach(function(el){
    el.addEventListener('click',function(){ drillMenu(parseInt(el.getAttribute('data-mi'))); });
  });
}

// ============================================================
// MONTHLY TAB
// ============================================================
function renderMonth(){
  function mCard(wkList, label){
    if(!wkList.length) return '<div class="card month-card"><div class="month-title">'+label+'（データなし）</div></div>';
    var ts=0,tc=0,okw=0;
    wkList.forEach(function(w){ ts+=w.ts; tc+=w.tc; if(w.ovr>=KPI_RATE)okw++; });
    var ovr=tc>0?ts/tc*100:0, ok=ovr>=KPI_RATE;
    var rows=wkList.map(function(w,i){
      var ok2=w.ovr>=KPI_RATE;
      return '<tr><td class="left">'+(i+1)+'W</td><td class="'+(ok2?'t-ok':'t-ng')+'">'+w.ovr.toFixed(2)+'%</td>'+
        '<td>'+w.ts.toLocaleString()+'食</td><td>'+w.tc.toLocaleString()+'名</td>'+
        '<td><span class="'+(ok2?'badge-ok':'badge-ng')+'">'+(ok2?'達成':'未達')+'</span></td></tr>';
    }).join('');
    return '<div class="card month-card">'+
      '<div class="month-title">'+label+'（'+wkList.length+'週）</div>'+
      '<div class="month-kpis">'+
        '<div class="month-kpi"><div class="month-kpi-label">注文率</div><div class="month-kpi-val" style="color:'+(ok?'var(--g1)':'var(--r1)')+'">'+ovr.toFixed(2)+'<span class="month-kpi-unit">%</span></div></div>'+
        '<div class="month-kpi"><div class="month-kpi-label">販売数</div><div class="month-kpi-val" style="color:var(--c2)">'+ts.toLocaleString()+'<span class="month-kpi-unit">食</span></div></div>'+
        '<div class="month-kpi"><div class="month-kpi-label">KPI達成</div><div class="month-kpi-val" style="color:'+(okw===wkList.length?'var(--g1)':'var(--r1)')+'">'+okw+'<span class="month-kpi-unit">/'+wkList.length+'W</span></div></div>'+
      '</div>'+
      '<table class="trend-table"><thead><tr><th class="left">週</th><th>注文率</th><th>販売数</th><th>総客数</th><th>KPI</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  var m3=[],m4=[];
  ALL_WK.forEach(function(wd){
    var ws=wkFilterSummary(wd);
    (wd.mon===4?m4:m3).push(ws);
  });
  var comp='';
  if(m3.length&&m4.length){
    var ts3=0,tc3=0,ts4=0,tc4=0;
    m3.forEach(function(w){ts3+=w.ts;tc3+=w.tc;}); m4.forEach(function(w){ts4+=w.ts;tc4+=w.tc;});
    var r3=tc3>0?ts3/tc3*100:0, r4=tc4>0?ts4/tc4*100:0, df=r4-r3, up=df>=0;
    comp='<div class="info-bar">&#x1F4CA; 3月平均 '+r3.toFixed(2)+'% &#x2192; 4月平均 '+r4.toFixed(2)+'%　'+(up?'&#x25B2;':'&#x25BC;')+Math.abs(df).toFixed(2)+'pt（'+(up?'改善':'悪化')+'）</div>';
  }
  document.getElementById('tab-month').innerHTML=comp+'<div class="month-grid">'+mCard(m3,'3月')+mCard(m4,'4月')+'</div>';
}

// ============================================================
// MO TAB
// ============================================================
function renderMO(){
  var moD={sales:0,cust:0,stores:{}}, poD={sales:0,cust:0,stores:{}};
  ALL_WK.forEach(function(wd){
    applyFilter(wd.stores).forEach(function(s){
      var tg=s.mo==='MO'?moD:poD;
      tg.sales+=s.sales; tg.cust+=s.cust;
      if(!tg.stores[s.name]) tg.stores[s.name]={sales:0,cust:0};
      tg.stores[s.name].sales+=s.sales; tg.stores[s.name].cust+=s.cust;
    });
  });
  function moCard(data,label,isMo){
    var ovr=data.cust>0?data.sales/data.cust*100:0, ok=ovr>=KPI_RATE;
    var sl=Object.keys(data.stores).map(function(n){
      var s=data.stores[n]; return{name:n,sales:s.sales,rate:s.cust>0?s.sales/s.cust*100:0};
    }).sort(function(a,b){return b.rate-a.rate;});
    var rows=sl.map(function(s){
      var ok2=s.rate>=KPI_RATE, fc=ok2?'var(--g1)':'var(--r1)';
      var bp=Math.min(s.rate/10*100,100), kp=KPI_RATE/10*100;
      return '<tr><td style="font-size:10px;font-weight:700">'+s.name+'</td>'+
        '<td class="bar-cell"><div class="bar-mini"><div class="bar-mini-fill" style="width:'+bp+'%;background:'+fc+'"></div><div class="bar-mini-kpi" style="left:'+kp+'%"></div></div></td>'+
        '<td class="rate-val '+(ok2?'rate-ok':'rate-ng')+'">'+s.rate.toFixed(2)+'%</td></tr>';
    }).join('');
    return '<div class="card mo-card">'+
      '<div class="mo-card" style="padding:12px">'+
      '<div class="mo-title '+(isMo?'mob':'pop')+'">'+label+'（'+sl.length+'店）</div>'+
      '<div style="display:flex;gap:16px;margin-bottom:12px">'+
        '<div><div style="font-size:9px;color:var(--n2);font-weight:700">注文率</div><div style="font-size:28px;font-weight:900;color:'+(ok?'var(--g1)':'var(--r1)')+'">'+ovr.toFixed(2)+'<span style="font-size:12px;color:var(--n2)">%</span></div></div>'+
        '<div><div style="font-size:9px;color:var(--n2);font-weight:700">販売数</div><div style="font-size:28px;font-weight:900;color:var(--c2)">'+data.sales.toLocaleString()+'<span style="font-size:11px;color:var(--n2)">食</span></div></div>'+
        '<div><div style="font-size:9px;color:var(--n2);font-weight:700">KPI</div><div style="font-size:22px;font-weight:900;color:'+(ok?'var(--g1)':'var(--r1)')+'">'+(ok?'達成':'未達')+'</div></div>'+
      '</div>'+
      '<table class="rank-table"><thead><tr><th class="left">店舗名</th><th>注文率</th><th>注文率</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }
  var comp='';
  if(moD.cust>0&&poD.cust>0){
    var rm=moD.sales/moD.cust*100, rp=poD.sales/poD.cust*100, df=rm-rp, up=df>=0;
    comp='<div class="info-bar">&#x1F4CA; MobileOrder '+rm.toFixed(2)+'% vs 季節メニューPOP '+rp.toFixed(2)+'%　差: '+(up?'&#x25B2;':'&#x25BC;')+Math.abs(df).toFixed(2)+'pt</div>';
  }
  document.getElementById('tab-mo').innerHTML=comp+'<div class="mo-grid">'+moCard(moD,'&#x1F4F1; MobileOrder',true)+moCard(poD,'&#x1F4CB; 季節メニューPOP',false)+'</div>';
}

// ============================================================
// DRILL DOWN
// ============================================================
function drillStore(idx){
  var store=DST[idx];
  var sm={}, cu=0;
  ALL_WK.forEach(function(wd){
    var s=wd.stores.filter(function(x){return x.name===store;})[0];
    if(!s) return;
    cu+=s.cust;
    Object.keys(s.menus).forEach(function(mn){ sm[mn]=(sm[mn]||0)+s.menus[mn]; });
  });
  var items=Object.keys(sm).map(function(mn){
    return{name:mn,sales:sm[mn],rate:cu>0?sm[mn]/cu*100:0};
  }).sort(function(a,b){return b.rate-a.rate;});
  var mx=items.length?Math.max(items[0].rate,KPI_RATE*2):KPI_RATE*2;
  var kp=KPI_RATE/mx*100;
  var rows=items.map(function(it){
    var ok=it.rate>=KPI_RATE, fc=ok?'var(--g1)':'var(--r1)';
    var bw=Math.min(it.rate/mx*100,100);
    return '<div class="modal-row" style="grid-template-columns:minmax(0,1fr) 130px 56px 44px">'+
      '<div class="modal-nm">'+it.name+'</div>'+
      '<div class="modal-bw"><div class="modal-bt"><div class="modal-bf" style="width:'+bw+'%;background:'+fc+'"></div></div><div class="modal-kl" style="left:'+kp+'%"></div></div>'+
      '<div class="modal-rv" style="color:'+fc+'">'+it.rate.toFixed(2)+'%</div>'+
      '<div class="modal-sv">'+it.sales+'食</div></div>';
  }).join('');
  document.getElementById('m-icon').textContent='🏪';
  document.getElementById('m-title').textContent=store+' ─ メニュー別注文率（累積）';
  document.getElementById('m-body').innerHTML=
    '<div class="modal-info">総客数: '+cu.toLocaleString()+'名　KPI: '+KPI_RATE+'%</div>'+
    '<div class="modal-table-hdr" style="grid-template-columns:minmax(0,1fr) 130px 56px 44px">'+
    '<span>メニュー名</span><span>注文率</span><span>注文率</span><span>販売数</span></div>'+
    rows;
  document.getElementById('modal').classList.add('on');
}
function drillMenu(idx){
  var menuName=DMN[idx];
  var storeMap={};
  ALL_WK.forEach(function(wd){
    wd.stores.forEach(function(s){
      if(!s.menus[menuName]) return;
      if(!storeMap[s.name]) storeMap[s.name]={sales:0,cust:0};
      storeMap[s.name].sales+=s.menus[menuName];
      storeMap[s.name].cust+=s.cust;
    });
  });
  var items=Object.keys(storeMap).map(function(sn){
    var sd=storeMap[sn];
    return{name:sn,sales:sd.sales,cust:sd.cust,rate:sd.cust>0?sd.sales/sd.cust*100:0,rgn:gR(sn)};
  }).sort(function(a,b){return b.rate-a.rate;});
  var mx=items.length?Math.max(items[0].rate,KPI_RATE*2):KPI_RATE*2;
  var kp=KPI_RATE/mx*100;
  var rows=items.map(function(it){
    var ok=it.rate>=KPI_RATE, fc=ok?'var(--g1)':'var(--r1)';
    var bw=Math.min(it.rate/mx*100,100);
    return '<div class="modal-row" style="grid-template-columns:minmax(0,1fr) 50px 130px 56px 44px">'+
      '<div class="modal-nm">'+it.name+'</div>'+
      '<div style="font-size:8px;text-align:center;color:var(--n2)">'+it.rgn+'</div>'+
      '<div class="modal-bw"><div class="modal-bt"><div class="modal-bf" style="width:'+bw+'%;background:'+fc+'"></div></div><div class="modal-kl" style="left:'+kp+'%"></div></div>'+
      '<div class="modal-rv" style="color:'+fc+'">'+it.rate.toFixed(2)+'%</div>'+
      '<div class="modal-sv">'+it.sales+'食</div></div>';
  }).join('');
  document.getElementById('m-icon').textContent='🍽';
  document.getElementById('m-title').textContent=menuName+' ─ 店舗別注文率（累積）';
  document.getElementById('m-body').innerHTML=
    '<div class="modal-info">全'+ALL_WK.length+'週累積　KPI: '+KPI_RATE+'%</div>'+
    '<div class="modal-table-hdr" style="grid-template-columns:minmax(0,1fr) 50px 130px 56px 44px">'+
    '<span>店舗名</span><span>地域</span><span>注文率</span><span>注文率</span><span>販売数</span></div>'+
    rows;
  document.getElementById('modal').classList.add('on');
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll(){
  if(!ALL_WK.length){
    document.getElementById('ld').style.display='none';
    document.getElementById('nodata').style.display='flex';
    return;
  }
  if(!CW) CW=ALL_WK[ALL_WK.length-1].wk;
  document.getElementById('ld').style.display='none';
  document.getElementById('nodata').style.display='none';
  document.getElementById('db').style.display='block';
  updateSbWeeks();
  updateSbMenus();
  // render active tab
  var activeTab=document.querySelector('.tab.on')?document.querySelector('.tab.on').getAttribute('data-tab'):'week';
  if(activeTab==='week') renderWeek();
  else if(activeTab==='month') renderMonth();
  else renderMO();
}

function updateSbWeeks(){
  var h='';
  ALL_WK.forEach(function(w,i){
    h+='<button class="sb-btn'+(w.wk===CW?' on-navy':'')+(CW==='__cum'&&w.wk===CW?' on-blue':'')+'" data-wk="'+w.wk+'">'+(i+1)+'W<span class="sb-wk-sub">'+w.wl+'</span></button>';
  });
  document.getElementById('sb-weeks').innerHTML=h;
  document.getElementById('btn-cum').className='sb-btn'+(CW==='__cum'?' on-blue':'');
}

function updateSbMenus(){
  // collect all menus
  var allMenus={};
  ALL_WK.forEach(function(wd){ wd.ml.forEach(function(m){ allMenus[m.name]=1; }); });
  var mnList=Object.keys(allMenus);
  var h='<button class="sb-btn'+(F.mn==='all'?' on':'')+'" data-f="mn" data-v="all">すべて</button>';
  mnList.forEach(function(mn){
    h+='<button class="sb-btn'+(F.mn===mn?' on':'')+'" data-f="mn" data-v="'+mn.replace(/"/g,'&quot;')+'">'+mn+'</button>';
  });
  document.getElementById('sb-menus').innerHTML=h;
}

// ============================================================
// INIT
// ============================================================
(function(){
  // Sidebar click (event delegation)
  document.querySelector('.sidebar').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    var f=b.getAttribute('data-f'), v=b.getAttribute('data-v'), wk=b.getAttribute('data-wk');
    if(f && v!==null){
      F[f]=v;
      document.querySelectorAll('.sb-btn[data-f="'+f+'"]').forEach(function(x){
        x.classList.toggle('on',x.getAttribute('data-v')===v);
      });
      renderAll(); return;
    }
    if(wk!==null){ CW=wk; updateSbWeeks(); renderAll(); return; }
  });
  // Tabs
  document.querySelector('.tabs').addEventListener('click',function(e){
    var t=e.target.getAttribute('data-tab'); if(!t) return;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.toggle('on',x.getAttribute('data-tab')===t); });
    ['week','month','mo'].forEach(function(x){
      document.getElementById('tab-'+x).style.display=x===t?'block':'none';
    });
    if(t==='week') renderWeek();
    else if(t==='month') renderMonth();
    else renderMO();
  });
  // Modal
  document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('on'); });
  document.getElementById('m-close').addEventListener('click',function(){ document.getElementById('modal').classList.remove('on'); });

  // Load data
  document.getElementById('ld').style.display='flex';
  fetch('data/index.json')
    .then(function(r){ if(!r.ok) throw new Error('index.json missing'); return r.json(); })
    .then(function(idx){
      var salesFiles=idx.sales||[], custFiles=idx.customers||[];
      return Promise.all([
        Promise.all(salesFiles.map(function(f){ return fetchText('data/sales/'+f); })),
        Promise.all(custFiles.map(function(f){ return fetchText('data/customers/'+f); }))
      ]);
    })
    .then(function(res){
      var salesTexts=res[0], custTexts=res[1];
      var custMap={};
      custTexts.forEach(function(t){ var m=parseCust(t); Object.assign(custMap,m); });
      var salesMap={};
      salesTexts.forEach(function(t){
        var m=parseSales(t);
        Object.keys(m).forEach(function(k){
          if(!salesMap[k]){ salesMap[k]=m[k]; return; }
          Object.keys(m[k].menus).forEach(function(mn){
            salesMap[k].menus[mn]=(salesMap[k].menus[mn]||0)+m[k].menus[mn];
          });
        });
      });
      ALL_WK=buildWeeks(salesMap,custMap);
      document.getElementById('ld').style.display='none';
      if(ALL_WK.length){ CW=ALL_WK[ALL_WK.length-1].wk; renderAll(); }
      else{ document.getElementById('nodata').style.display='flex'; }
    })
    .catch(function(err){
      document.getElementById('ld').style.display='none';
      document.getElementById('nodata').style.display='flex';
      console.warn('load error:',err.message);
    });
})();
</script>
